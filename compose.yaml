services:
  postgres:
    image: postgres:18
    container_name: bi-system-postgres
    environment:
      POSTGRES_USER: bi_system
      POSTGRES_PASSWORD: bi_system
      POSTGRES_DB: bi_system
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_system -d bi_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
