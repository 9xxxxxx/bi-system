name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: bi_system
          POSTGRES_PASSWORD: bi_system
          POSTGRES_DB: bi_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bi_system -d bi_system"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BI_DATABASE_URL: postgresql+psycopg://bi_system:bi_system@localhost:5432/bi_system
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv
      - name: Install backend dependencies
        run: uv sync --locked --all-groups
      - name: Lint backend
        run: uv run ruff check backend scripts
      - name: Check backend formatting
        run: uv run ruff format --check backend scripts
      - name: Type check backend
        run: uv run basedpyright backend/src backend/tests scripts
      - name: Test backend with SQLite defaults
        run: |
          unset BI_DATABASE_URL
          uv run pytest backend/tests -q --cov=bi_system --cov-report=xml
      - name: Verify PostgreSQL migrations
        run: |
          uv run alembic -c backend/alembic.ini upgrade head
          uv run pytest backend/tests/integration -q
          uv run alembic -c backend/alembic.ini downgrade base
          uv run alembic -c backend/alembic.ini upgrade head

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Check frontend
        run: npm --prefix frontend run check
      - name: Build frontend
        run: npm --prefix frontend run build
